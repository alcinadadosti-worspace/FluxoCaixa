  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; font-family:var(--font); color:var(--text);
    background:var(--bg); min-height:100dvh; overflow-x:hidden;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    letter-spacing:-0.01em;
  }

  /* aurora de fundo (Frutiger Aero, discreto) */
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% -20%, rgba(40,80,110,.32), rgba(0,0,0,0) 60%),
      linear-gradient(180deg, #0b1118 0%, #090d12 55%, #080b10 100%);
  }
  .blob{ position:absolute; border-radius:50%; filter:blur(95px); opacity:.5; mix-blend-mode:screen; }
  .b1{ width:520px; height:520px; left:-130px; top:-150px; background:radial-gradient(circle, rgba(63,210,221,.55), rgba(63,210,221,0) 70%); animation:drift1 28s ease-in-out infinite; }
  .b2{ width:480px; height:480px; right:-130px; top:-90px; background:radial-gradient(circle, rgba(95,176,255,.5), rgba(95,176,255,0) 70%); animation:drift2 34s ease-in-out infinite; }
  .b3{ width:560px; height:560px; left:6%; bottom:-240px; background:radial-gradient(circle, rgba(148,227,107,.4), rgba(148,227,107,0) 70%); animation:drift3 31s ease-in-out infinite; }
  .b4{ width:400px; height:400px; right:5%; bottom:-170px; background:radial-gradient(circle, rgba(63,210,221,.38), rgba(63,210,221,0) 70%); animation:drift1 30s ease-in-out infinite reverse; }
  @keyframes drift1{ 0%,100%{ transform:translate(0,0) scale(1) } 50%{ transform:translate(40px,30px) scale(1.08) } }
  @keyframes drift2{ 0%,100%{ transform:translate(0,0) scale(1) } 50%{ transform:translate(-50px,20px) scale(1.05) } }
  @keyframes drift3{ 0%,100%{ transform:translate(0,0) scale(1) } 50%{ transform:translate(30px,-30px) scale(1.1) } }

  #app{ position:relative; z-index:1; min-height:100dvh; display:flex; flex-direction:column; }

  /* superfícies de vidro escuro */
  .glass{
    position:relative; background:var(--panel);
    backdrop-filter: blur(22px) saturate(135%); -webkit-backdrop-filter: blur(22px) saturate(135%);
    border:1px solid var(--line); border-radius:var(--radius);
    box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 16px 40px rgba(0,0,0,.45);
  }

  /* top bar */
  .topbar{ position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:14px; padding:11px 16px; margin:12px; border-radius:14px; }
  .brand{ display:flex; align-items:center; gap:11px; min-width:0; }
  .orb-logo{ width:36px; height:36px; flex:none; background-image:var(--logo); background-size:contain; background-repeat:no-repeat; background-position:center; filter:drop-shadow(0 0 6px rgba(214,178,90,.45)); }
  .brand b{ font-size:16px; font-weight:700; color:var(--text); white-space:nowrap; letter-spacing:-0.02em; }
  .brand span{ display:block; font-size:10.5px; font-weight:500; color:var(--text-dim); letter-spacing:.4px; text-transform:uppercase; }
  .spacer{ flex:1; }
  .user-chip{ display:flex; align-items:center; gap:10px; }
  .user-chip .who{ text-align:right; line-height:1.15; }
  .user-chip .who b{ font-size:13px; font-weight:600; color:var(--text); }
  .user-chip .who small{ font-size:10.5px; color:var(--text-dim); font-weight:500; }
  .avatar{ width:32px; height:32px; border-radius:9px; flex:none; display:grid; place-items:center; color:#cdeef1; font-weight:700; font-size:13px;
    background:rgba(63,210,221,.16); border:1px solid rgba(63,210,221,.32); }

  /* botões */
  .btn{ appearance:none; cursor:pointer; font-family:var(--font); font-weight:600; font-size:13.5px; color:#06231f;
    padding:10px 18px; border-radius:11px; position:relative; letter-spacing:-0.01em;
    background:linear-gradient(180deg,#6fe0e8,#3cc6c5); border:1px solid rgba(150,240,240,.55);
    box-shadow:0 6px 20px rgba(63,210,221,.26);
    transition:background .15s ease, border-color .15s ease, transform .12s ease, box-shadow .15s ease, filter .15s ease; }
  .btn:hover{ transform:translateY(-1px); filter:brightness(1.06); box-shadow:0 8px 26px rgba(63,210,221,.38); }
  .btn:active{ transform:translateY(0); }
  .btn.green{ background:linear-gradient(180deg,#9be878,#56c98f); border-color:rgba(150,240,180,.55); box-shadow:0 6px 20px rgba(110,220,150,.28); color:#06231a; }
  .btn.green:hover{ box-shadow:0 8px 26px rgba(110,220,150,.4); }
  .btn.ghost{ color:var(--text); background:rgba(255,255,255,.05); border:1px solid var(--line-2); box-shadow:none; font-weight:600; }
  .btn.ghost:hover{ background:rgba(255,255,255,.1); filter:none; box-shadow:none; }
  .btn.sm{ padding:7px 13px; font-size:12.5px; border-radius:9px; }
  .btn:focus-visible, a:focus-visible, input:focus-visible, summary:focus-visible{ outline:2px solid var(--aqua); outline-offset:2px; }

  /* inputs */
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:12px; font-weight:600; color:var(--text-soft); }
  .field .hint{ font-size:11px; font-weight:500; color:var(--text-dim); }
  .input{ font-family:var(--font); font-size:14.5px; color:var(--text); width:100%; padding:11px 13px; border-radius:11px;
    border:1px solid var(--line-2); background:rgba(255,255,255,.04);
    transition:border-color .15s ease, box-shadow .15s ease, background .15s ease; }
  .input::placeholder{ color:#5b6c7a; }
  .input:focus{ outline:none; border-color:rgba(63,210,221,.6); background:rgba(63,210,221,.06); box-shadow:0 0 0 3px rgba(63,210,221,.18); }
  .input.money{ font-variant-numeric:tabular-nums; }
  .prefix-wrap{ position:relative; }
  .prefix-wrap .rs{ position:absolute; left:13px; top:50%; transform:translateY(-50%); font-weight:600; color:var(--text-dim); font-size:13.5px; pointer-events:none; }
  .prefix-wrap .input{ padding-left:34px; }

  /* containers */
  .wrap{ width:100%; max-width:1100px; margin:0 auto; padding:6px 18px 44px; }
  .page-title{ display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap; margin:14px 2px 18px; }
  .page-title h1{ margin:0; font-size:23px; font-weight:700; color:var(--text); letter-spacing:-0.02em; }
  .page-title p{ margin:0; color:var(--text-soft); font-weight:500; font-size:13.5px; }

  /* métricas */
  .summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
  .metric{ padding:16px; border-radius:14px; }
  .metric .k{ font-size:11px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; color:var(--text-dim); }
  .metric .v{ font-size:23px; font-weight:700; color:var(--text); margin-top:7px; font-variant-numeric:tabular-nums; line-height:1; letter-spacing:-0.02em; }
  .metric .s{ font-size:11.5px; font-weight:500; color:var(--text-soft); margin-top:6px; }
  .metric.accent-green .v{ color:var(--green); }

  /* lojas */
  .store-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .store-card{ padding:16px; border-radius:14px; cursor:pointer; text-align:left; display:flex; flex-direction:column; gap:14px;
    transition:transform .14s ease, border-color .15s ease, box-shadow .18s ease; }
  .store-card:hover{ transform:translateY(-2px); border-color:rgba(255,255,255,.18); box-shadow:0 18px 44px rgba(0,0,0,.5); }
  .store-top{ display:flex; align-items:center; gap:12px; }
  .store-orb{ width:40px; height:40px; border-radius:11px; flex:none; display:grid; place-items:center; font-weight:700; font-size:15px; letter-spacing:0; }
  .store-card h3{ margin:0; font-size:15px; font-weight:600; color:var(--text); line-height:1.2; letter-spacing:-0.01em; }
  .store-card .loc{ font-size:11.5px; font-weight:500; color:var(--text-dim); margin-top:2px; }
  .store-foot{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding-top:13px; border-top:1px solid var(--line); }
  .store-foot .last{ font-size:11px; color:var(--text-dim); font-weight:500; }
  .store-foot .last b{ display:block; font-size:15px; font-weight:600; color:var(--text); font-variant-numeric:tabular-nums; margin-top:2px; }

  .badge{ font-size:10.5px; font-weight:600; padding:4px 9px; border-radius:8px; letter-spacing:.2px; white-space:nowrap; border:1px solid transparent; }
  .badge.ok{ color:#bef0c4; background:rgba(110,220,150,.14); border-color:rgba(110,220,150,.32); }
  .badge.warn{ color:#f3d39a; background:rgba(240,180,74,.14); border-color:rgba(240,180,74,.3); }
  .badge.neutral{ color:#bcd6ea; background:rgba(95,176,255,.12); border-color:rgba(95,176,255,.28); }

  /* detalhe */
  .detail-grid{ display:grid; grid-template-columns:1fr 1.25fr; gap:14px; align-items:start; }
  .panel{ padding:18px; border-radius:14px; }
  .panel h2{ margin:0 0 4px; font-size:15.5px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
  .panel .sub{ margin:0 0 16px; font-size:12px; color:var(--text-dim); font-weight:500; }
  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .form-grid .full{ grid-column:1/-1; }
  .calc{ margin-top:14px; padding:14px; border-radius:12px;
    background:linear-gradient(150deg, rgba(63,210,221,.1), rgba(148,227,107,.08));
    border:1px solid rgba(111,224,232,.22); }
  .calc .formula{ font-size:12px; font-weight:600; color:var(--text-soft); font-variant-numeric:tabular-nums; }
  .calc .result{ display:flex; align-items:baseline; justify-content:space-between; margin-top:8px; gap:10px; }
  .calc .result span{ font-size:11px; font-weight:600; color:var(--text-soft); text-transform:uppercase; letter-spacing:.4px; }
  .calc .result b{ font-size:25px; font-weight:700; color:var(--green); font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }

  /* lista de fechamentos */
  .closings{ display:flex; flex-direction:column; gap:8px; max-height:560px; overflow:auto; padding-right:4px; }
  .closing-row{ display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:12px; padding:12px 13px; border-radius:11px;
    background:rgba(255,255,255,.03); border:1px solid var(--line); }
  .closing-row .date{ font-weight:700; color:var(--text); font-size:13px; min-width:70px; font-variant-numeric:tabular-nums; }
  .closing-row .nums{ display:flex; gap:16px; flex-wrap:wrap; }
  .closing-row .nums div{ font-size:11px; color:var(--text-dim); font-weight:500; }
  .closing-row .nums b{ display:block; font-size:14px; font-weight:600; color:var(--text); font-variant-numeric:tabular-nums; margin-top:1px; }
  .closing-row .nums .in b{ color:var(--green); }

          const q = fs.query(fs.collection(db, 'auditorias'), fs.where('storeId', '==', storeId));
          const snap = await fs.getDocs(q);
          return snap.docs.map(d => ({ id:d.id, ...d.data() })).sort((a,b) => (b.criadoEm||0) - (a.criadoEm||0));
        };
        const col = fs.collection(db, 'closings');
        const ref = key => fs.doc(db, 'closings', key);
        backend = {
          async get(key){ const s = await fs.getDoc(ref(key)); return s.exists() ? s.data() : null; },
          async set(key, value){ await fs.setDoc(ref(key), value); return value; },
          async del(key){ await fs.deleteDoc(ref(key)); },
          async list(prefix){
            // por loja ("closing:<id>:"): filtra pelo campo storeId — compatível com as regras de
            // segurança do Firestore. Geral ("closing:"): varre por id (permitido só p/ financeiro).
            const m = prefix.match(/^closing:([^:]+):$/);
            const q = m
              ? fs.query(col, fs.where('storeId', '==', m[1]))
              : fs.query(col, fs.orderBy(fs.documentId()), fs.startAt(prefix), fs.endAt(prefix + ''));
            const snap = await fs.getDocs(q);
            return snap.docs.map(d => d.id);
          },
        };
        Store.online = true;
      }catch(e){
        console.error('Firebase indisponível — usando dados locais:', e);
        try{ toast('Sem conexão com o banco — usando dados locais.', 'err'); }catch(_){}
      }
    })();
  }

  return {
    usingFirebase, online:false,
    ready: () => ready,
    signIn:  async () => ({ ok:false, error:'auth-indisponivel' }),  // sobrescrito quando o Firebase conecta
    signOut: async () => {},
    getToken: async () => null,                                      // idem (idToken do usuário logado)
    listAuditorias: async () => [],                                  // idem (auditorias da loja — só no Firebase)
    get:  async (k)    => { await ready; return backend.get(k); },
    set:  async (k, v) => { await ready; return backend.set(k, v); },
    del:  async (k)    => { await ready; return backend.del(k); },
    list: async (p)    => { await ready; return backend.list(p); },
  };
})();

/* ---------- Helpers ---------- */
let _seq = 0;

const BRL = new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' });
const money = n => BRL.format(Number(n) || 0);
const fmtDate = iso => { const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; };
const fmtDateTime = ts => new Date(ts).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
function todayISO(){ const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseNum(str){
  if(typeof str === 'number') return str;
  if(!str) return 0;
  let s = String(str).trim().replace(/[^\d.,-]/g, '');
  if(s.includes(',') && s.includes('.')) s = s.replace(/\./g,'').replace(',', '.');
  else if(s.includes(',')) s = s.replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function onlyDigits(v){ return String(v == null ? '' : v).replace(/\D/g, ''); }
function docKind(v){ return onlyDigits(v).length === 14 ? 'CNPJ' : 'CPF'; }
function formatDoc(v){
  const d = onlyDigits(v);
  if(d.length === 11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
  if(d.length === 14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
  return d || '—';
}
function sumSangria(list){ return (list || []).reduce((a, s) => a + (Number(s.valor) || 0), 0); }

/* validação real de CPF / CNPJ (dígitos verificadores) */
function isValidCPF(v){
  const c = onlyDigits(v); if(c.length !== 11 || /^(\d)\1{10}$/.test(c)) return false;
  let s = 0; for(let i=0;i<9;i++) s += +c[i]*(10-i); let d1 = (s*10)%11; if(d1===10) d1=0; if(d1 !== +c[9]) return false;
  s = 0; for(let i=0;i<10;i++) s += +c[i]*(11-i); let d2 = (s*10)%11; if(d2===10) d2=0; return d2 === +c[10];
}
function isValidCNPJ(v){
  const c = onlyDigits(v); if(c.length !== 14 || /^(\d)\1{13}$/.test(c)) return false;
  const calc = len => { let s=0, pos=len-7; for(let i=len;i>=1;i--){ s += +c[len-i]*pos--; if(pos<2) pos=9; } const r=s%11; return r<2?0:11-r; };
  return calc(12) === +c[12] && calc(13) === +c[13];
}
function isValidDoc(v){ const c = onlyDigits(v); return c.length===11 ? isValidCPF(c) : c.length===14 ? isValidCNPJ(c) : false; }

/* período */
const PERIOD_LABEL = { 'mes':'Mês atual', 'mes-1':'Mês passado', '90d':'Últimos 90 dias', 'tudo':'Tudo' };
function monthKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function periodMatch(iso, period){
  const now = new Date();
  if(period === 'tudo') return true;
  if(period === 'mes') return iso.startsWith(monthKey(now));
  if(period === 'mes-1') return iso.startsWith(monthKey(new Date(now.getFullYear(), now.getMonth()-1, 1)));
  if(period === '90d'){ const l = new Date(now); l.setDate(now.getDate()-90); return iso >= `${l.getFullYear()}-${String(l.getMonth()+1).padStart(2,'0')}-${String(l.getDate()).padStart(2,'0')}`; }
  return true;
}

/* alertas do Slack (best-effort): envia pro backend; nunca trava o app */
async function notifyBackend(path, payload){
  if(!Store.usingFirebase) return;                                 // alertas só no modo Firebase
  const base = BACKEND_URL ? BACKEND_URL.replace(/\/+$/,'') : '';  // vazio = mesma origem (o backend serve o app)
  try{
    const token = await Store.getToken();
    if(!token) return;
    await fetch(base + path, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
      body: JSON.stringify(payload)
    });
  }catch(_){ /* alerta é opcional; ignora falhas */ }
}

/* chamada ao backend que PRECISA da resposta (auditoria) */
async function callBackend(path, payload){
  const base = BACKEND_URL ? BACKEND_URL.replace(/\/+$/,'') : '';
  const token = await Store.getToken();
  if(!token) throw new Error('sem login');
  const r = await fetch(base + path, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
    body: JSON.stringify(payload)
  });
  return r.json();
}

/* ---------- Modelo + ciclo de vida ---------- */
function mapSangrias(list, dateISO){
  return (list || []).map(s => ({ valor:+(Number(s.valor)||0), doc:onlyDigits(s.doc), nota:(s.nota||'').trim(), data:s.data||dateISO, motivo:(s.motivo||'').trim() }));
}
function makeClosing(storeId, dateISO, sobra, sangrias, operador){
  const list = mapSangrias(sangrias, dateISO);
  const so = +(Number(sobra)||0), totalSangria = +sumSangria(list).toFixed(2);
  const createdAt = uid();
  return {
    id:'c_'+createdAt, createdAt, storeId, date:dateISO,
    sobra:so, sangrias:list, totalSangria, totalDia:+(so+totalSangria).toFixed(2),
    status:'enviado', operador, excluido:false,
    audit:[ { acao:'criado', por:operador, papel:(session ? session.role : 'loja'), em:Date.now() } ]
  };
}
const keyFor = rec => `closing:${rec.storeId}:${rec.createdAt}`;

async function getClosings(storeId, includeDeleted=false){
  const keys = await Store.list(`closing:${storeId}:`);
  const items = [];
  for(const k of keys){ const v = await Store.get(k); if(v && (includeDeleted || !v.excluido)) items.push(v); }
  items.sort((a,b) => a.date < b.date ? 1 : a.date > b.date ? -1 : (a.createdAt < b.createdAt ? 1 : -1));
  return items;
}
async function getAllClosings(includeDeleted=false){
  const keys = await Store.list('closing:');
  const items = [];
  for(const k of keys){ const v = await Store.get(k); if(v && (includeDeleted || !v.excluido)) items.push(v); }
  return items;
}

/* acumulado por loja (histórico completo, ignora o filtro de período):
   soma a dívida (faltas) e a sobra de TODAS as conferências da loja. */
async function acumuladoLoja(storeId){
  const list = await getClosings(storeId);   // não-excluídos
  let falta = 0, sobra = 0, nFalta = 0, nSobra = 0;
  for(const c of list){
    if(c.status !== 'conferido' || !c.resultado) continue;
    if(c.resultado === 'falta'){ falta += Math.abs(c.diferenca || 0); nFalta++; }
    else if(c.resultado === 'sobra'){ sobra += (c.diferenca || 0); nSobra++; }
  }
  falta = +falta.toFixed(2); sobra = +sobra.toFixed(2);
  return { falta, sobra, saldo:+(sobra - falta).toFixed(2), nFalta, nSobra };
}
/* versão síncrona p/ quando já temos a lista de caixas em mãos (ex.: dashboard) */
function acumuladoFromList(list){
  let falta = 0, sobra = 0, nFalta = 0, nSobra = 0;
  for(const c of (list || [])){
    if(c.status !== 'conferido' || !c.resultado) continue;
    if(c.resultado === 'falta'){ falta += Math.abs(c.diferenca || 0); nFalta++; }
    else if(c.resultado === 'sobra'){ sobra += (c.diferenca || 0); nSobra++; }
  }
  falta = +falta.toFixed(2); sobra = +sobra.toFixed(2);
  return { falta, sobra, saldo:+(sobra - falta).toFixed(2), nFalta, nSobra };
}

function classifica(diferenca){ return Math.abs(diferenca) < 0.005 ? 'ok' : (diferenca < 0 ? 'falta' : 'sobra'); }
function resultadoTexto(rec){
  if(rec.resultado === 'ok') return 'bateu';
  if(rec.resultado === 'falta') return 'falta ' + money(Math.abs(rec.diferenca));
  if(rec.resultado === 'sobra') return 'sobra ' + money(rec.diferenca);
  return '';
}
async function conferirClosing(rec, vendaSistema){
  rec.status = 'conferido';

  rec.resultado = classifica(rec.diferenca);
  rec.audit.push({ acao:'conferido', por:actor(), papel:session.role, em:Date.now(), obs:'venda sistema ' + money(rec.vendaSistema) + ' · ' + resultadoTexto(rec) });
  await Store.set(keyFor(rec), rec);
  if(rec.resultado && rec.resultado !== 'ok'){
    notifyBackend('/notify/divergencia', { loja:(storeById(rec.storeId)||{}).name, data:fmtDate(rec.date), resultado:rec.resultado, diferenca:money(Math.abs(rec.diferenca)), venda:money(rec.vendaSistema), apurado:money(rec.totalDia) });
  }
}

  rec.audit.push({ acao:'excluído', por:actor(), papel:session.role, em:Date.now(), obs:motivo });

}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (kind ? ' ' + kind : '');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
}

/* ---------- Modal (confirmação / motivo) ---------- */
function modal({ title, message, confirmText='Confirmar', cancelText='Cancelar', danger=false, input=null, onConfirm }){
  const back = document.createElement('div');
  back.className = 'modal-back';
  back.innerHTML = `
    <div class="modal glass">
      <h3>${esc(title)}</h3>
      ${message ? `<p>${message}</p>` : ''}
      ${input ? `<div class="field" style="margin-top:12px;"><label>${esc(input.label)}</label>${input.money ? `<div class="prefix-wrap"><span class="rs">R$</span><input class="input money" id="modalInput" inputmode="decimal" placeholder="${esc(input.placeholder||'0,00')}"></div>` : `<input class="input" id="modalInput" placeholder="${esc(input.placeholder||'')}">`}</div>` : ''}
      <div class="modal-actions">
        <button class="btn ghost sm" id="modalCancel">${esc(cancelText)}</button>
        <button class="btn sm ${danger?'danger':''}" id="modalOk">${esc(confirmText)}</button>
      </div>
    </div>`;
  document.body.appendChild(back);
  const close = () => back.remove();
  const inputEl = back.querySelector('#modalInput');
  if(inputEl && input.money) maskMoneyInput(inputEl);
  back.addEventListener('click', e => { if(e.target === back) close(); });
  back.querySelector('#modalCancel').addEventListener('click', close);
  back.querySelector('#modalOk').addEventListener('click', () => {
    const val = inputEl ? inputEl.value.trim() : null;
    if(input && input.required && !val){ inputEl.style.borderColor = 'var(--danger)'; inputEl.focus(); return; }
    close(); onConfirm(val);
  });
  if(inputEl) inputEl.focus();
}

/* ---------- Exportação (Excel via SheetJS, com fallback CSV) ---------- */
let _xlsx = null;
function ensureXLSX(){
  if(typeof XLSX !== 'undefined') return Promise.resolve(true);
  if(_xlsx) return _xlsx;
  _xlsx = new Promise(res => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => res(true); s.onerror = () => res(false);
    document.head.appendChild(s);
  });
  return _xlsx;
}
async function gatherExport(storeIds, period){
  const all = await getAllClosings();
  const items = all.filter(c => storeIds.includes(c.storeId) && periodMatch(c.date, period)).sort((a,b) => a.date < b.date ? -1 : 1);
  const lastConf = c => ([...(c.audit||[])].reverse().find(a => a.acao === 'conferido') || {}).por || '';
  const resLabel = r => r === 'ok' ? 'Bateu' : r === 'falta' ? 'Falta' : r === 'sobra' ? 'Sobra' : '';
  const fech = items.map(c => ({
    Loja: storeById(c.storeId)?.name || c.storeId,
    Data: fmtDate(c.date),
    Status: c.status === 'conferido' ? 'Conferido' : 'Enviado',
    'Valor que restou': c.sobra,
    'Total de sangria': c.totalSangria,
    'Total apurado': c.totalDia,
    'Venda (sistema)': c.status === 'conferido' ? c.vendaSistema : '',
    'Diferença': c.status === 'conferido' ? c.diferenca : '',
    Resultado: c.status === 'conferido' ? resLabel(c.resultado) : '',
    'Qtd sangrias': (c.sangrias||[]).length,
    Operador: c.operador || '',
    'Conferido por': c.status === 'conferido' ? lastConf(c) : ''
  }));
  const sang = [];
  items.forEach(c => (c.sangrias||[]).forEach(s => sang.push({
    Loja: storeById(c.storeId)?.name || c.storeId,
    'Data do caixa': fmtDate(c.date),
    Valor: s.valor, 'CPF/CNPJ': formatDoc(s.doc), Nota: s.nota || '',
    Motivo: s.motivo || '', 'Data da sangria': fmtDate(s.data || c.date)
  })));
  return { fech, sang, count: items.length };
}
function toCSV(rows){
  if(!rows.length) return '';
  const head = Object.keys(rows[0]);
  const cell = v => { v = String(v ?? ''); return /[",;\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; };
  return [head.join(';')].concat(rows.map(r => head.map(h => cell(r[h])).join(';'))).join('\n');
}
function downloadText(name, text){
  const blob = new Blob(['\ufeff' + text], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
async function runExport(storeIds, period){
  const { fech, sang, count } = await gatherExport(storeIds, period);
  if(!count){ toast('Nada para exportar neste período.', 'err'); return; }
  const fname = `caixas_${period}_${todayISO()}`;
  const ok = await ensureXLSX();
  try {
    if(ok && typeof XLSX !== 'undefined'){
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fech), 'Fechamentos');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sang.length ? sang : [{ Sangrias:'nenhuma' }]), 'Sangrias');
      XLSX.writeFile(wb, fname + '.xlsx');
      toast('Exportado: ' + fname + '.xlsx');
    } else {
      downloadText(fname + '.csv', toCSV(fech));
      toast('Exportado (CSV): ' + fname + '.csv');
    }
  } catch(e){ toast('Não foi possível exportar aqui.', 'err'); }
}

          <div class="sangria-form glass" id="sangriaForm" style="display:none;">
            <div class="form-grid">
              <div class="field"><label for="s-valor">Valor da sangria</label><div class="prefix-wrap"><span class="rs">R$</span><input class="input money" id="s-valor" inputmode="decimal" placeholder="0,00"></div></div>
              <div class="field"><label for="s-doc">CPF / CNPJ do destino</label><input class="input" id="s-doc" inputmode="numeric" placeholder="onde o dinheiro foi gasto"></div>
              <div class="field"><label for="s-nota">Número da nota <span class="hint">(opcional)</span></label><input class="input" id="s-nota" placeholder="ex.: NF 12345"></div>
              <div class="field"><label for="s-data">Data</label><input class="input" id="s-data" type="date" value="${todayISO()}"></div>
              <div class="field full"><label for="s-motivo">Motivo</label><input class="input" id="s-motivo" placeholder="ex.: pagamento fornecedor"></div>
            </div>
            <div class="sangria-actions"><button class="btn ghost sm" type="button" id="cancelSangriaBtn">Cancelar</button><button class="btn sm" type="button" id="saveSangriaBtn">Adicionar sangria</button></div>
          </div>
          <div class="draft-list" id="draftList"></div>
          <div class="field" style="margin-top:14px;"><label for="f-sobra">Valor que restou <span class="hint">(sem a sangria)</span></label><div class="prefix-wrap"><span class="rs">R$</span><input class="input money" id="f-sobra" inputmode="decimal" placeholder="0,00"></div></div>
          <div class="calc" id="closeSummary"></div>
          <div class="close-actions">
            ${isEdit ? '<button class="btn ghost" type="button" id="cancelEditBtn" style="flex:1;">Cancelar edição</button>' : ''}
            <button class="btn green" type="button" id="closeBtn" style="flex:2;">${isEdit ? 'Salvar alterações' : 'Fechar e enviar'}</button>
          </div>
        </div>` : '';

  const metricsRow = session.role === 'loja' ? `
        ${metricCard('Total do período', money(totalP), PERIOD_LABEL[state.period], 'accent-green')}
        ${metricCard('Sangrias do período', money(sangriaP), 'Total sangrado')}
        ${metricCard('Restou no período', money(restouP), 'Sem as sangrias')}
        ${metricCard('Fechamentos', String(closings.length), 'No período')}
      ` : `
        ${metricCard('Total apurado', money(totalP), PERIOD_LABEL[state.period], 'accent-green')}
        ${metricCard('A conferir', String(aConferirS), 'Aguardando conferência', aConferirS ? 'accent-amber' : '')}
        ${metricCard('Divergências', String(divergS), 'Falta ou sobra', divergS ? 'accent-amber' : '')}
        ${metricCard('Fechamentos', String(closings.length), 'No período')}
      `;

  const auditPanel = session.role === 'financeiro' ? `
        <div class="panel glass">
          <h2>🕵️ Auditoria surpresa</h2>
          <p class="sub">Escolha a colaboradora e informe o valor que deveria ter no caixa agora. Ela recebe um aviso no Slack pra contar e declarar.</p>
          <div class="field"><label for="aud-op">Colaboradora</label><select class="input" id="aud-op">${store.operadores.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('')}</select></div>
          <div class="field"><label for="aud-val">Valor esperado no caixa</label><div class="prefix-wrap"><span class="rs">R$</span><input class="input money" id="aud-val" inputmode="decimal" placeholder="0,00"></div></div>
          <button class="btn" type="button" id="aud-send">Enviar auditoria surpresa</button>
          <div class="block-head" style="margin-top:18px;"><span>Auditorias desta loja</span></div>
          <div class="aud-list">${audits.length ? audits.map(auditRow).join('') : '<div class="sub">Nenhuma auditoria ainda.</div>'}</div>
        </div>` : '';

  app.innerHTML = `
    ${topbar()}
    <div class="wrap">
      ${backLink}
      <div class="page-head">
        <div class="ttl"><h1>${esc(store.name)}</h1><p>${esc(store.loc)}</p></div>
        ${periodSelect()}
        <button class="btn ghost sm" id="exportBtn">⤓ Exportar</button>
      </div>
      ${opBanner}
      <div class="summary">${metricsRow}</div>
      <div class="ledger-head" style="margin:22px 0 10px;">
        <h2 style="margin:0;font-size:17px;">Acumulado da loja</h2>
        <p class="sub" style="margin:4px 0 0;">Histórico completo de falta e sobra — soma de todas as conferências (não depende do período).</p>
      </div>
      <div class="summary">
        ${metricCard('Dívida acumulada', money(acc.falta), `${acc.nFalta} ${acc.nFalta === 1 ? 'caixa' : 'caixas'} com falta`, acc.falta ? 'accent-amber' : '')}
        ${metricCard('Sobra acumulada', money(acc.sobra), `${acc.nSobra} ${acc.nSobra === 1 ? 'caixa' : 'caixas'} com sobra`, acc.sobra ? 'accent-green' : '')}
        ${metricCard('Saldo', (acc.saldo > 0 ? '+' : '') + money(acc.saldo), acc.saldo < 0 ? 'a loja deve' : acc.saldo > 0 ? 'a favor da loja' : 'zerado', acc.saldo < 0 ? 'accent-amber' : acc.saldo > 0 ? 'accent-green' : '')}
      </div>
      <div class="detail-grid${session.role === 'loja' ? '' : ' single'}">
        ${formPanel}
        ${auditPanel}
        <div class="panel glass">
          <h2>${session.role === 'financeiro' ? 'Caixas enviados pelas lojas' : 'Caixas do período'}</h2>
          <p class="sub">${closings.length} ${closings.length === 1 ? 'caixa' : 'caixas'} · ${PERIOD_LABEL[state.period].toLowerCase()}${session.role === 'financeiro' ? ' · confira a venda do sistema em cada caixa' : ''}</p>
          <div class="history">${history}</div>
        </div>
      </div>
    </div>
    <div class="foot">${footHTML()}</div>
  `;
  bindHeaderControls([store.id]);
  if(backLink) document.getElementById('back').addEventListener('click', () => { editing = null; navigate('dashboard'); });
  if(session.role === 'loja') document.getElementById('trocarOp').addEventListener('click', () => { state.operator = null; editing = null; render(); });

  if(session.role === 'loja'){
  /* rascunho de sangrias */
  let draftSangrias = isEdit ? editRec.sangrias.map(s => ({ ...s })) : [];
  const sangriaForm = document.getElementById('sangriaForm');
  const draftList = document.getElementById('draftList');
  const closeSummary = document.getElementById('closeSummary');
  const fSobra = document.getElementById('f-sobra');
  const fDate = document.getElementById('f-date');
  if(isEdit) fSobra.value = (editRec.sobra).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
  maskMoneyInput(fSobra); maskMoneyInput(document.getElementById('s-valor'));

  function renderDraft(){
    draftList.innerHTML = draftSangrias.map((s, i) => `
      <div class="sg-item draft">
        <div class="sg-val">${money(s.valor)}</div>
        <div class="sg-info"><b>${esc(s.motivo || 'Sangria')}</b><span>${docKind(s.doc)} ${esc(formatDoc(s.doc))}${s.nota ? ' · Nota ' + esc(s.nota) : ''} · ${fmtDate(s.data)}</span></div>
        <button class="icon-btn" title="Remover" data-rm="${i}">✕</button>
      </div>`).join('');
    draftList.querySelectorAll('[data-rm]').forEach(b => b.addEventListener('click', () => { draftSangrias.splice(+b.dataset.rm, 1); renderDraft(); }));
    renderSummary();
  }
  function renderSummary(){
    const totalSangria = sumSangria(draftSangrias), restou = parseNum(fSobra.value), totalDia = restou + totalSangria;
    closeSummary.innerHTML = `
      <div class="sum-row"><span>Total de sangria</span><b class="amber">${money(totalSangria)}</b></div>
      <div class="sum-row"><span>Valor que restou</span><b>${money(restou)}</b></div>
      <div class="sum-row total"><span>Total do dia</span><b>${money(totalDia)}</b></div>
      <div class="formula">Total do dia = valor que restou + sangrias</div>`;
  }
  document.getElementById('addSangriaBtn').addEventListener('click', () => {
    sangriaForm.style.display = sangriaForm.style.display === 'none' ? 'block' : 'none';
    if(sangriaForm.style.display === 'block') document.getElementById('s-valor').focus();
  });
  document.getElementById('cancelSangriaBtn').addEventListener('click', () => { sangriaForm.style.display = 'none'; ['s-valor','s-doc','s-nota','s-motivo'].forEach(id => document.getElementById(id).value = ''); });
  document.getElementById('saveSangriaBtn').addEventListener('click', () => {
    const valor = parseNum(document.getElementById('s-valor').value);
    const doc = onlyDigits(document.getElementById('s-doc').value);
    const data = document.getElementById('s-data').value || todayISO();
    const motivo = document.getElementById('s-motivo').value.trim();
    const nota = document.getElementById('s-nota').value.trim();
    if(valor <= 0){ toast('Informe o valor da sangria.', 'err'); return; }
    if(!isValidDoc(doc)){ toast('CPF/CNPJ inválido — confira os dígitos.', 'err'); return; }
    if(!motivo){ toast('Informe o motivo da sangria.', 'err'); return; }
    draftSangrias.push({ valor, doc, nota, data, motivo });
    ['s-valor','s-doc','s-nota','s-motivo'].forEach(id => document.getElementById(id).value = '');
    sangriaForm.style.display = 'none'; renderDraft(); toast('Sangria adicionada.');
  });
  fSobra.addEventListener('input', renderSummary);
  renderDraft();

  if(isEdit) document.getElementById('cancelEditBtn').addEventListener('click', () => { editing = null; render(); });
  document.getElementById('closeBtn').addEventListener('click', async () => {
    const dateISO = fDate.value || todayISO();
    const restou = parseNum(fSobra.value);
    if(restou <= 0 && draftSangrias.length === 0){ toast('Informe o valor que restou e/ou alguma sangria.', 'err'); return; }
    const except = isEdit ? editRec.createdAt : null;
    if(await dateClashes(store.id, dateISO, except)){ toast('Já existe caixa para ' + fmtDate(dateISO) + ' nesta loja. Edite o existente.', 'err'); return; }
    const total = restou + sumSangria(draftSangrias);
    modal({
      title: isEdit ? 'Salvar alterações?' : 'Confirmar fechamento?',
      message: `Total do dia: <b>${money(total)}</b><br>Sangrias: ${money(sumSangria(draftSangrias))} · Restou: ${money(restou)}`,
      confirmText: isEdit ? 'Salvar' : 'Fechar e enviar',
      onConfirm: async () => {
        if(isEdit){ await updateClosing(editRec, dateISO, restou, draftSangrias); editing = null; toast('Caixa atualizado.'); }
        else { await saveNewClosing(store.id, dateISO, restou, draftSangrias); toast('Caixa enviado · total ' + money(total)); }
        navigate('store', { id: store.id });
      }
    });
  });
  }

  /* financeiro: enviar auditoria surpresa */
  if(session.role === 'financeiro'){
    const opSel = document.getElementById('aud-op');
    const valInp = document.getElementById('aud-val');
    if(valInp) maskMoneyInput(valInp);
    const sendBtn = document.getElementById('aud-send');
    if(sendBtn) sendBtn.addEventListener('click', async () => {
      const colaborador = opSel.value;
      const slackId = SLACK_IDS[colaborador];
      const valorEsperado = parseNum(valInp.value);
      if(!slackId){ toast('Essa pessoa ainda não tem Slack cadastrado.', 'err'); return; }
      if(valorEsperado <= 0){ toast('Informe o valor esperado.', 'err'); return; }
      sendBtn.disabled = true; sendBtn.textContent = 'Enviando…';
      let r; try{ r = await callBackend('/audit/start', { storeId:store.id, loja:store.name, colaborador, slackId, valorEsperado }); }catch(_){ r = null; }
      sendBtn.disabled = false; sendBtn.textContent = 'Enviar auditoria surpresa';
      if(r && r.ok){ toast('Auditoria enviada para ' + colaborador + ' 🕵️'); navigate('store', { id: store.id }); }
      else { toast((r && r.error) ? r.error : 'Não foi possível enviar.', 'err'); }
    });
  }

  /* ações do histórico */
  app.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => { editing = { storeId: store.id, createdAt: b.dataset.edit }; render(); window.scrollTo({ top:0, behavior:'smooth' }); }));
  app.querySelectorAll('[data-conf]').forEach(b => b.addEventListener('click', async () => {
    const rec = await findClosing(store.id, b.dataset.conf);
    modal({
      title:`Conferir caixa de ${fmtDate(rec.date)}`,
      message:`A loja apurou <b>${money(rec.totalDia)}</b> &nbsp;(restou ${money(rec.sobra)} + sangria ${money(rec.totalSangria)}).<br>Informe a <b>venda do sistema</b> para conferir. Se bater, fica OK; se não, marca falta ou sobra.`,
      input:{ label:'Venda registrada no sistema', placeholder:'0,00', required:true, money:true },
      confirmText:'Conferir',
      onConfirm: async (val) => {
        await conferirClosing(rec, parseNum(val));
        toast(rec.resultado === 'ok' ? 'Conferido · bateu certinho ✓' : rec.resultado === 'falta' ? 'Conferido · falta ' + money(Math.abs(rec.diferenca)) : 'Conferido · sobra ' + money(rec.diferenca), rec.resultado === 'ok' ? '' : 'err');
        navigate('store', { id: store.id });
      }
    });
  }));
  app.querySelectorAll('[data-reab]').forEach(b => b.addEventListener('click', async () => {
    const rec = await findClosing(store.id, b.dataset.reab);
    modal({ title:'Reabrir caixa?', message:'Isso destrava o caixa para correção e fica registrado na trilha.', input:{ label:'Motivo da reabertura', placeholder:'ex.: ajuste de valor', required:true }, confirmText:'Reabrir', onConfirm: async (m) => { await reabrirClosing(rec, m); toast('Caixa reaberto.'); navigate('store', { id: store.id }); } });
  }));
  app.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
    const rec = await findClosing(store.id, b.dataset.del);
    modal({ title:'Excluir caixa?', message:`Caixa de ${fmtDate(rec.date)} — ${money(rec.totalDia)}. Fica registrado quem excluiu e por quê.`, danger:true, input:{ label:'Motivo da exclusão', placeholder:'obrigatório', required:true }, confirmText:'Excluir', onConfirm: async (m) => { await excluirClosing(rec, m); toast('Caixa excluído.'); navigate('store', { id: store.id }); } });
  }));

  if(session.role === 'loja') checkAuditoria(store);
}

/* ---------- Render ---------- */
async function render(){
  if(!session){ viewLogin(); return; }
  if(route.name === 'store') return viewStore();
  return viewDashboard();
}

/* ---------- Boot ---------- */
(async function boot(){
  await Store.ready();                            // espera o Firebase conectar (se configurado)
  if(!Store.usingFirebase) await seedSamples();  // dados de exemplo só no modo memória
  render();
})();

</script>
</body>
</html>
